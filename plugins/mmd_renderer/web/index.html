<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sakura MMD Renderer</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <canvas id="mmd-canvas"></canvas>

  <!--
    使用经典脚本而非 ES module：通过 file:// 加载本地 module 脚本会触发
    Chromium 的跨域限制（file origin 为 null，相对 import 被拒绝），导致页面
    脚本无法加载。改用按依赖顺序加载的经典脚本，确保 QWebEngineView 直接可跑。
  -->
  <!-- vendored three.js + MMDLoader（本地，不走 CDN）。顺序：核心 → 解析器 → 贴图/模型加载器 -->
  <script src="./vendor/three.min.js"></script>
  <script src="./vendor/mmdparser.min.js"></script>
  <script src="./vendor/TGALoader.js"></script>
  <script src="./vendor/MMDLoader.js"></script>
  <script src="./renderer_runtime.js"></script>
  <script src="./sakura_mmd.js"></script>
  <script src="./main.js"></script>
</body>
</html>
