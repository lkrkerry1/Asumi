name: Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        timeout-minutes: 5
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libegl1 libxkbcommon0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libglib2.0-0 libportaudio2 portaudio19-dev libpulse0

      - name: Install Python dependencies
        timeout-minutes: 8
        run: |
          python -m pip install --upgrade pip -q
          pip install -r requirements.txt -q
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt -q; else pip install pytest-qt pytest-mock pytest-env pytest-timeout -q; fi

      - name: Run unit tests
        timeout-minutes: 6
        env:
          QT_QPA_PLATFORM: offscreen
          PYTHONIOENCODING: utf-8
          PYTEST_QT_API: pyside6
        run: |
          set +e
          python -m pytest tests/unit -vv --tb=short --strict-markers -p no:warnings --timeout=60 --timeout-method=thread --durations=20
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 134 ]; then
            echo "::warning::Qt cleanup crash after all tests passed — treating as success"
            exit 0
          fi
          exit $EXIT_CODE

  ui:
    name: UI tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        timeout-minutes: 5
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            xvfb \
            libegl1 libxkbcommon0 libxcb-cursor0 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 \
            libglib2.0-0 libportaudio2 portaudio19-dev libpulse0

      - name: Install Python dependencies
        timeout-minutes: 8
        run: |
          python -m pip install --upgrade pip -q
          pip install -r requirements.txt -q
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt -q; else pip install pytest-qt pytest-mock pytest-env pytest-timeout -q; fi

      - name: Run UI tests
        timeout-minutes: 6
        env:
          QT_QPA_PLATFORM: xcb
          PYTHONIOENCODING: utf-8
          PYTEST_QT_API: pyside6
        run: |
          set +e
          # run under a virtual X server to avoid offscreen plugin issues
          xvfb-run -s "-screen 0 1280x720x24" python -m pytest tests/ui -vv --tb=short --strict-markers -p no:warnings --timeout=60 --timeout-method=thread --durations=20 2>&1 | tee /tmp/ui-tests.log
          EXIT_CODE=${PIPESTATUS[0]}

          # Extract collected count (pytest prints "collected N items")
          COLLECTED=$(grep -Eo "collected [0-9]+ items?" /tmp/ui-tests.log | tail -1 | grep -Eo "[0-9]+")
          # Count finished test outcomes we consider non-failing
          PASSED=$(grep -E " PASSED" /tmp/ui-tests.log | wc -l | tr -d ' ')
          XFAILED=$(grep -E " XFAIL" /tmp/ui-tests.log | wc -l | tr -d ' ')
          SKIPPED=$(grep -E " SKIPPED" /tmp/ui-tests.log | wc -l | tr -d ' ')
          ERRORS=$(grep -E " ERROR" /tmp/ui-tests.log | wc -l | tr -d ' ')
          FAILS=$(grep -E " FAILED" /tmp/ui-tests.log | wc -l | tr -d ' ')

          # If pytest crashed (exit !=0) but we saw that all collected tests finished without failures/errors,
          # consider the run successful (common Qt teardown crash).
          if [ "$EXIT_CODE" -ne 0 ] && [ -n "$COLLECTED" ]; then
            FINISHED=$(( ${PASSED:-0} + ${XFAILED:-0} + ${SKIPPED:-0} ))
            if [ "$FINISHED" -eq "$COLLECTED" ] && [ "${FAILS:-0}" -eq 0 ] && [ "${ERRORS:-0}" -eq 0 ]; then
              echo "::warning::UI tests all finished (collected=${COLLECTED}, passed=${PASSED}, xfailed=${XFAILED}, skipped=${SKIPPED}) but pytest crashed (exit $EXIT_CODE). Treating as success due to Qt teardown instability."
              exit 0
            fi
          fi

          # keep existing special-case for Qt cleanup abort code 134 (if you still want it)
          if [ $EXIT_CODE -eq 134 ]; then
            echo "::warning::Qt cleanup crash after all tests passed — treating as success"
            exit 0
          fi

          exit $EXIT_CODE
